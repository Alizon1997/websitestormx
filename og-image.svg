<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF914D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Lightning bolt icon -->
  <text x="80" y="160" font-size="48" fill="#FF5500">&#9889;</text>

  <!-- Company name -->
  <text x="140" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Storm X Digital</text>

  <!-- Main title -->
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Automatizzazioni AI</text>
  <text x="80" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-1">per il Tuo Business</text>

  <!-- Services list -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9CA3AF">Make.com</text>
  <circle cx="215" cy="384" r="3" fill="#FF5500"/>
  <text x="230" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9CA3AF">Claude Code</text>
  <circle cx="410" cy="384" r="3" fill="#FF5500"/>
  <text x="425" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9CA3AF">AI Voice Agents</text>
  <circle cx="640" cy="384" r="3" fill="#FF5500"/>
  <text x="655" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9CA3AF">Lead Generation B2B</text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#6B7280">Workflow intelligenti, riduzione costi operativi, pipeline prevedibili</text>

  <!-- CTA button -->
  <rect x="80" y="480" width="280" height="52" rx="8" fill="url(#accent)"/>
  <text x="130" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">stormxdigital.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>

  <!-- Decorative elements -->
  <circle cx="1050" cy="180" r="120" fill="#FF5500" opacity="0.06"/>
  <circle cx="1100" cy="350" r="80" fill="#FF5500" opacity="0.04"/>
  <circle cx="950" cy="450" r="60" fill="#FF5500" opacity="0.03"/>
</svg>
